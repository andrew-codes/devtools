---
- name: Install and configure 1Password SSH agent
  hosts: localhost
  gather_facts: true
  tasks:
    - name: Install 1Password (macOS via Homebrew cask)
      community.general.homebrew_cask:
        name: 1password
        state: present
      when: ansible_facts['system'] == 'Darwin' and git_ssh_agent == '1p'

    - name: Configure 1Password SSH agent in ~/.bashrc (macOS)
      ansible.builtin.blockinfile:
        path: "~/.bashrc"
        create: true
        mode: "0644"
        marker: "# {mark} devtools:1p-ssh-agent"
        block: |
          export SSH_AUTH_SOCK=$HOME/.1password/agent.sock
      when: ansible_facts['system'] == 'Darwin' and git_ssh_agent == '1p'

    - name: Ensure 1Password SSH config directory exists (macOS)
      ansible.builtin.file:
        path: "~/.config/1Password/ssh"
        state: directory
        mode: "0700"
      when:
        - ansible_facts['system'] == 'Darwin'
        - git_ssh_agent == '1p'
        - onepassword_ssh_key | length > 0

    - name: Configure 1Password SSH agent.toml (macOS)
      ansible.builtin.copy:
        dest: "~/.config/1Password/ssh/agent.toml"
        mode: "0600"
        content: |
          [[ssh-keys]]
          vault = "Private"
          item = "{{ onepassword_ssh_key }}"
      when:
        - ansible_facts['system'] == 'Darwin'
        - git_ssh_agent == '1p'
        - onepassword_ssh_key | length > 0

    - name: Install 1Password (Windows via Chocolatey)
      chocolatey.chocolatey.win_chocolatey:
        name: 1password
        state: present
      when: ansible_facts['os_family'] == 'Windows' and git_ssh_agent == '1p'

    - name: Check OpenSSH Authentication Agent service (Windows)
      ansible.windows.win_service_info:
        name: ssh-agent
      register: windows_ssh_agent_service
      when: ansible_facts['os_family'] == 'Windows' and git_ssh_agent == '1p'

    - name: Disable OpenSSH Authentication Agent service (Windows)
      ansible.windows.win_service:
        name: ssh-agent
        state: stopped
        start_mode: disabled
      when:
        - ansible_facts['os_family'] == 'Windows'
        - git_ssh_agent == '1p'
        - (windows_ssh_agent_service.services | default([]) | length) > 0

    - name: Configure 1Password SSH agent in ~/.bashrc (Windows)
      ansible.windows.win_shell: |
        $bashrc = "$env:USERPROFILE\.bashrc"
        $begin  = "# BEGIN devtools:1p-ssh-agent"
        $end    = "# END devtools:1p-ssh-agent"
        $lines  = @(
          "# BEGIN devtools:1p-ssh-agent",
          'export PATH="/c/Windows/System32/OpenSSH:$PATH"',
          'alias ssh="/c/Windows/System32/OpenSSH/ssh.exe"',
          'alias ssh-add="/c/Windows/System32/OpenSSH/ssh-add.exe"',
          "# END devtools:1p-ssh-agent"
        )
        $block = $lines -join "`n"
        if (-not (Test-Path $bashrc)) { New-Item -ItemType File -Path $bashrc -Force | Out-Null }
        $content = Get-Content $bashrc -Raw -ErrorAction SilentlyContinue
        if ($null -ne $content -and $content -match [regex]::Escape($begin)) {
          $content = $content -replace "(?s)$([regex]::Escape($begin)).*?$([regex]::Escape($end))", $block
        } else {
          if ($null -ne $content) { $base = $content.TrimEnd() } else { $base = "" }
          $content = $base + "`n" + $block + "`n"
        }
        [System.IO.File]::WriteAllText($bashrc, $content.TrimStart(), (New-Object System.Text.UTF8Encoding($false)))
      when: ansible_facts['os_family'] == 'Windows' and git_ssh_agent == '1p'
      changed_when: true

    - name: Ensure 1Password SSH config directory exists (Windows)
      ansible.windows.win_file:
        path: "{{ ansible_facts['env']['LOCALAPPDATA'] }}\\1Password\\config\\ssh"
        state: directory
      vars:
        windows_onepassword_ssh_key: "{{ ansible_facts['env']['ONEPASSWORD_SSH_KEY'] | default(onepassword_ssh_key, true) }}"
      when:
        - ansible_facts['os_family'] == 'Windows'
        - git_ssh_agent == '1p'
        - windows_onepassword_ssh_key | length > 0

    - name: Configure 1Password SSH agent.toml (Windows)
      ansible.windows.win_copy:
        dest: "{{ ansible_facts['env']['LOCALAPPDATA'] }}\\1Password\\config\\ssh\\agent.toml"
        content: |
          [[ssh-keys]]
          vault = "Private"
          item = "{{ windows_onepassword_ssh_key }}"
      vars:
        windows_onepassword_ssh_key: "{{ ansible_facts['env']['ONEPASSWORD_SSH_KEY'] | default(onepassword_ssh_key, true) }}"
      when:
        - ansible_facts['os_family'] == 'Windows'
        - git_ssh_agent == '1p'
        - windows_onepassword_ssh_key | length > 0
