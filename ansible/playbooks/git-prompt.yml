---
- name: Install and configure git prompt
  hosts: localhost
  gather_facts: true
  tasks:
    - name: Download git-prompt.sh (macOS/Linux)
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/git/git/master/contrib/completion/git-prompt.sh
        dest: "{{ tools_home }}/git-prompt.sh"
        mode: "0755"
        force: false
      when: ansible_facts['os_family'] != 'Windows'

    - name: Download git-prompt.sh (Windows)
      ansible.windows.win_get_url:
        url: https://raw.githubusercontent.com/git/git/master/contrib/completion/git-prompt.sh
        dest: "{{ tools_home }}/git-prompt.sh"
        force: false
      when: ansible_facts['os_family'] == 'Windows'

    - name: Configure git-prompt in ~/.bashrc (macOS/Linux)
      ansible.builtin.blockinfile:
        path: "~/.bashrc"
        create: true
        mode: "0644"
        marker: "# {mark} devtools:git-prompt"
        block: |
          if [ -f {{ tools_home }}/git-prompt.sh ]; then
            source {{ tools_home }}/git-prompt.sh
          fi
      when: ansible_facts['os_family'] != 'Windows'

    - name: Configure git-prompt in ~/.bashrc (Windows)
      ansible.windows.win_shell: |
        $bashrc = "$env:USERPROFILE\.bashrc"
        $begin  = "# BEGIN devtools:git-prompt"
        $end    = "# END devtools:git-prompt"
        $lines  = @(
          "# BEGIN devtools:git-prompt",
          "if [ -f {{ tools_home }}/git-prompt.sh ]; then",
          "  source {{ tools_home }}/git-prompt.sh",
          "fi",
          "# END devtools:git-prompt"
        )
        $block = $lines -join "`n"
        if (-not (Test-Path $bashrc)) { New-Item -ItemType File -Path $bashrc -Force | Out-Null }
        $content = Get-Content $bashrc -Raw -ErrorAction SilentlyContinue
        if ($null -ne $content -and $content -match [regex]::Escape($begin)) {
          $content = $content -replace "(?s)$([regex]::Escape($begin)).*?$([regex]::Escape($end))", $block
        } else {
          if ($null -ne $content) { $base = $content.TrimEnd() } else { $base = "" }
          $content = $base + "`n" + $block + "`n"
        }
        Set-Content -Path $bashrc -Value $content.TrimStart() -NoNewline
      when: ansible_facts['os_family'] == 'Windows'
      changed_when: true
