---
- name: Install Visual Studio Code and extensions
  hosts: localhost
  gather_facts: true
  tasks:
    - name: Check if VS Code app already exists (macOS)
      ansible.builtin.stat:
        path: /Applications/Visual Studio Code.app
      register: _vscode_app
      when: ansible_facts['system'] == 'Darwin'

    - name: Install VS Code (macOS via Homebrew cask)
      community.general.homebrew_cask:
        name: visual-studio-code
        state: present
      when: ansible_facts['system'] == 'Darwin' and not _vscode_app.stat.exists

    - name: Install VS Code (Windows via Chocolatey)
      chocolatey.chocolatey.win_chocolatey:
        name: vscode
        state: present
      when: ansible_facts['os_family'] == 'Windows'

    - name: Compute desired VS Code extension hash
      ansible.builtin.set_fact:
        vscode_extensions_hash: "{{ (vscode_extensions | unique | sort | join('\n')) | hash('sha256') }}"
      changed_when: false

    - name: Check VS Code extension hash file (macOS)
      ansible.builtin.stat:
        path: "{{ ansible_facts['user_dir'] }}/.vscode-extensions.hash"
      register: vscode_extensions_hash_macos_stat
      when: ansible_facts['system'] == 'Darwin'

    - name: Read VS Code extension hash file (macOS)
      ansible.builtin.slurp:
        path: "{{ ansible_facts['user_dir'] }}/.vscode-extensions.hash"
      register: vscode_extensions_hash_macos_raw
      when:
        - ansible_facts['system'] == 'Darwin'
        - vscode_extensions_hash_macos_stat.stat.exists

    - name: Determine whether VS Code extensions should be installed (macOS)
      ansible.builtin.set_fact:
        vscode_extensions_install_needed_macos: >-
          {{
            (not vscode_extensions_hash_macos_stat.stat.exists)
            or ((vscode_extensions_hash_macos_raw.content | b64decode | trim) != vscode_extensions_hash)
          }}
      when: ansible_facts['system'] == 'Darwin'

    - name: Check VS Code extension hash file (Windows)
      ansible.windows.win_stat:
        path: "{{ ansible_facts['env']['USERPROFILE'] }}\\.vscode-extensions.hash"
      register: vscode_extensions_hash_windows_stat
      when: ansible_facts['os_family'] == 'Windows'

    - name: Read VS Code extension hash file (Windows)
      ansible.windows.win_shell: |
        Get-Content -Path "{{ ansible_facts['env']['USERPROFILE'] }}\\.vscode-extensions.hash" -Raw
      register: vscode_extensions_hash_windows_raw
      changed_when: false
      when:
        - ansible_facts['os_family'] == 'Windows'
        - vscode_extensions_hash_windows_stat.stat.exists

    - name: Determine whether VS Code extensions should be installed (Windows)
      ansible.builtin.set_fact:
        vscode_extensions_install_needed_windows: >-
          {{
            (not vscode_extensions_hash_windows_stat.stat.exists)
            or ((vscode_extensions_hash_windows_raw.stdout | trim) != vscode_extensions_hash)
          }}
      when: ansible_facts['os_family'] == 'Windows'

    - name: Install VS Code extensions (macOS)
      ansible.builtin.command:
        cmd: code --install-extension {{ item }}
      loop: "{{ vscode_extensions }}"
      retries: 3
      delay: 5
      register: vscode_extensions_macos_result
      until: vscode_extensions_macos_result.rc == 0
      when:
        - ansible_facts['system'] == 'Darwin'
        - vscode_extensions_install_needed_macos
      changed_when: true

    - name: Persist VS Code extension hash (macOS)
      ansible.builtin.copy:
        dest: "{{ ansible_facts['user_dir'] }}/.vscode-extensions.hash"
        content: "{{ vscode_extensions_hash }}\n"
        mode: '0644'
      when:
        - ansible_facts['system'] == 'Darwin'
        - vscode_extensions_install_needed_macos

    - name: Install VS Code extensions (Windows)
      ansible.windows.win_shell: |
        code --install-extension {{ item }}
      loop: "{{ vscode_extensions }}"
      retries: 3
      delay: 5
      register: vscode_extensions_windows_result
      until: vscode_extensions_windows_result.rc == 0
      when:
        - ansible_facts['os_family'] == 'Windows'
        - vscode_extensions_install_needed_windows

    - name: Persist VS Code extension hash (Windows)
      ansible.windows.win_copy:
        dest: "{{ ansible_facts['env']['USERPROFILE'] }}\\.vscode-extensions.hash"
        content: "{{ vscode_extensions_hash }}\r\n"
      when:
        - ansible_facts['os_family'] == 'Windows'
        - vscode_extensions_install_needed_windows

    - name: Ensure VS Code user settings directory exists (macOS)
      ansible.builtin.file:
        path: "{{ ansible_facts['user_dir'] }}/Library/Application Support/Code/User"
        state: directory
        mode: '0755'
      when: ansible_facts['system'] == 'Darwin'

    - name: Write VS Code settings merge script (macOS)
      ansible.builtin.copy:
        dest: /tmp/devtools_vscode_settings.py
        mode: "0700"
        content: |
          import json, os, re

          path = os.path.expanduser(
              "~/Library/Application Support/Code/User/settings.json"
          )

          def parse_jsonc(text):
              out = []
              i = 0
              in_string = False
              while i < len(text):
                  c = text[i]
                  if in_string:
                      if c == "\\" and i + 1 < len(text):
                          out.append(c)
                          out.append(text[i + 1])
                          i += 2
                          continue
                      if c == '"':
                          in_string = False
                      out.append(c)
                  else:
                      if c == '"':
                          in_string = True
                          out.append(c)
                      elif c == "/" and i + 1 < len(text) and text[i + 1] == "/":
                          while i < len(text) and text[i] != "\n":
                              i += 1
                          continue
                      elif c == "/" and i + 1 < len(text) and text[i + 1] == "*":
                          i += 2
                          while i < len(text) - 1 and not (text[i] == "*" and text[i + 1] == "/"):
                              i += 1
                          i += 2
                          continue
                      else:
                          out.append(c)
                  i += 1
              stripped = re.sub(r",\s*([}\]])", r"\1", "".join(out))
              return json.loads(stripped, strict=False)

          existing = {}
          if os.path.exists(path):
              with open(path) as f:
                  existing = parse_jsonc(f.read())

          existing.update({
              "workbench.panel.defaultLocation": "left",
              "chat.mcp.discovery.enabled": True,
              "chat.mcp.autoStart": True,
          })

          os.makedirs(os.path.dirname(path), exist_ok=True)
          with open(path, "w") as f:
              json.dump(existing, f, indent=4)
              f.write("\n")
      when: ansible_facts['system'] == 'Darwin'

    - name: Merge and write VS Code settings (macOS)
      ansible.builtin.command:
        cmd: python3 /tmp/devtools_vscode_settings.py
      when: ansible_facts['system'] == 'Darwin'
      changed_when: true

    - name: Remove VS Code settings merge script (macOS)
      ansible.builtin.file:
        path: /tmp/devtools_vscode_settings.py
        state: absent
      when: ansible_facts['system'] == 'Darwin'

    - name: Ensure VS Code MCP configuration file exists (macOS)
      ansible.builtin.copy:
        dest: "{{ ansible_facts['user_dir'] }}/Library/Application Support/Code/User/mcp.json"
        content: "{}\n"
        force: false
        mode: '0644'
      when: ansible_facts['system'] == 'Darwin'

    - name: Configure VS Code MCP servers (macOS)
      ansible.builtin.shell: |
        mcp_path="{{ ansible_facts['user_dir'] }}/Library/Application Support/Code/User/mcp.json"
        current="$(cat "$mcp_path")"
        patched="$(jq --arg name "{{ item }}" --argjson config '{{ claude_mcp_servers[item] | to_json }}' '.servers[$name] //= $config' "$mcp_path")"

        if [[ "$patched" != "$current" ]]; then
          printf '%s\n' "$patched" > "$mcp_path"
          echo "changed=true"
        else
          echo "changed=false"
        fi
      args:
        executable: /bin/bash
      loop:
        - context7
        - github
        - serena
        - atlassian
      register: vscode_mcp_macos_result
      changed_when: "'changed=true' in vscode_mcp_macos_result.stdout"
      when: ansible_facts['system'] == 'Darwin'

    - name: Ensure VS Code user settings directory exists (Windows)
      ansible.windows.win_file:
        path: "{{ ansible_facts['env']['APPDATA'] }}\\Code\\User"
        state: directory
      when: ansible_facts['os_family'] == 'Windows'

    - name: Merge VS Code settings (Windows)
      ansible.windows.win_shell: |
        $settingsPath = Join-Path $env:APPDATA 'Code\User\settings.json'

        if (Test-Path $settingsPath) {
          $parsed = Get-Content -Path $settingsPath -Raw | ConvertFrom-Json
          $current = @{}
          foreach ($prop in $parsed.PSObject.Properties) { $current[$prop.Name] = $prop.Value }
        } else {
          $current = @{}
        }

        $desiredProfiles = @{
          'Git Bash' = @{
            source = 'Git Bash'
          }
        }

        $changed = $false

        if ($current['workbench.panel.defaultLocation'] -ne 'left') {
          $current['workbench.panel.defaultLocation'] = 'left'
          $changed = $true
        }

        if ($current['terminal.integrated.defaultProfile.windows'] -ne 'Git Bash') {
          $current['terminal.integrated.defaultProfile.windows'] = 'Git Bash'
          $changed = $true
        }

        if ($current['chat.mcp.discovery.enabled'] -ne $true) {
          $current['chat.mcp.discovery.enabled'] = $true
          $changed = $true
        }

        if ($current['chat.mcp.autoStart'] -ne $true) {
          $current['chat.mcp.autoStart'] = $true
          $changed = $true
        }

        $profilesJsonCurrent = $current['terminal.integrated.profiles.windows'] | ConvertTo-Json -Depth 10 -Compress
        $profilesJsonDesired = $desiredProfiles | ConvertTo-Json -Depth 10 -Compress
        if ($profilesJsonCurrent -ne $profilesJsonDesired) {
          $current['terminal.integrated.profiles.windows'] = $desiredProfiles
          $changed = $true
        }

        if ($changed) {
          $content = $current | ConvertTo-Json -Depth 20
          if ([string]::IsNullOrWhiteSpace($content)) {
            throw "ConvertTo-Json produced empty output while updating $settingsPath"
          }
          $tmp = $settingsPath + '.tmp'
          [System.IO.File]::WriteAllText($tmp, ($content.TrimEnd() + [Environment]::NewLine))
          Move-Item -Path $tmp -Destination $settingsPath -Force
          Write-Output 'changed=true'
        } else {
          Write-Output 'changed=false'
        }
      register: vscode_settings_windows_result
      changed_when: "'changed=true' in vscode_settings_windows_result.stdout"
      when: ansible_facts['os_family'] == 'Windows'

    - name: Ensure VS Code MCP configuration file exists (Windows)
      ansible.windows.win_shell: |
        $mcpPath = Join-Path $env:APPDATA 'Code\User\mcp.json'
        if (-not (Test-Path $mcpPath)) {
          [System.IO.File]::WriteAllText($mcpPath, "{}" + [Environment]::NewLine)
          Write-Output 'changed=true'
        } else {
          Write-Output 'changed=false'
        }
      register: vscode_mcp_windows_file_result
      changed_when: "'changed=true' in vscode_mcp_windows_file_result.stdout"
      when: ansible_facts['os_family'] == 'Windows'

    - name: Configure VS Code MCP servers (Windows)
      ansible.windows.win_shell: |
        $mcpPath = Join-Path $env:APPDATA 'Code\User\mcp.json'
        $mcpObj = Get-Content -Path $mcpPath -Raw | ConvertFrom-Json
        if (-not $mcpObj.PSObject.Properties['servers']) {
          $mcpObj | Add-Member -NotePropertyName 'servers' -NotePropertyValue ([PSCustomObject]@{})
        }
        $name = "{{ item }}"
        $config = '{{ claude_mcp_servers[item] | to_json }}' | ConvertFrom-Json
        if (-not $mcpObj.servers.PSObject.Properties[$name]) {
          $mcpObj.servers | Add-Member -NotePropertyName $name -NotePropertyValue $config
          $json = $mcpObj | ConvertTo-Json -Depth 20
          if ([string]::IsNullOrWhiteSpace($json)) {
            throw "ConvertTo-Json produced empty output while updating $mcpPath"
          }
          $tmp = $mcpPath + '.tmp'
          [System.IO.File]::WriteAllText($tmp, ($json.TrimEnd() + [Environment]::NewLine), (New-Object System.Text.UTF8Encoding($false)))
          Move-Item -Path $tmp -Destination $mcpPath -Force
          Write-Output 'changed=true'
        } else {
          Write-Output 'changed=false'
        }
      loop:
        - context7
        - github
        - serena
        - atlassian
      register: vscode_mcp_windows_result
      changed_when: "'changed=true' in vscode_mcp_windows_result.stdout"
      when: ansible_facts['os_family'] == 'Windows'
      no_log: true
