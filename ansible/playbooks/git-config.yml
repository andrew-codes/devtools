---
- name: Configure git globals
  hosts: localhost
  gather_facts: true
  tasks:
    - name: Set common git globals
      community.general.git_config:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        scope: global
      loop:
        - {name: push.default, value: simple}
        - {name: branch.autosetuprebase, value: always}
        - {name: core.autocrlf, value: "false"}
        - {name: init.defaultBranch, value: main}
        - {name: commit.gpgsign, value: "true"}
        - {name: gpg.format, value: ssh}

    - name: Set git user email
      community.general.git_config:
        name: user.email
        value: "{{ git_email }}"
        scope: global
      when: git_email | length > 0

    - name: Set git user name
      community.general.git_config:
        name: user.name
        value: "{{ git_name }}"
        scope: global
      when: git_name | length > 0

    - name: Set git signing key
      community.general.git_config:
        name: user.signingkey
        value: "{{ git_signing_key }}"
        scope: global
      when: git_signing_key | length > 0

    - name: Set macOS git config
      community.general.git_config:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        scope: global
      loop:
        - {name: core.editor, value: "code --wait"}
      when: ansible_system == 'Darwin'

    - name: Set macOS 1Password git signing config
      community.general.git_config:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        scope: global
      loop:
        - {name: gpg.program, value: "/Applications/1Password.app/Contents/MacOS/op-ssh-sign"}
        - {name: gpg.ssh.program, value: "/Applications/1Password.app/Contents/MacOS/op-ssh-sign"}
      when:
        - ansible_system == 'Darwin'
        - git_ssh_agent == '1p'

    - name: Set Windows git config
      community.general.git_config:
        name: core.editor
        value: '"{{ ansible_env.LOCALAPPDATA }}\Programs\Microsoft VS Code\bin\code" --wait'
        scope: global
      when: ansible_os_family == 'Windows'

    - name: Set Windows 1Password git signing config
      community.general.git_config:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        scope: global
      loop:
        - {name: gpg.ssh.program, value: 'C:\Program Files\1Password\app\8\op-ssh-sign.exe'}
        - {name: core.sshCommand, value: "C:/Windows/System32/OpenSSH/ssh.exe"}
      when:
        - ansible_os_family == 'Windows'
        - git_ssh_agent == '1p'
