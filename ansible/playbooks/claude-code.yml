---
- name: Install Claude Code CLI
  hosts: localhost
  gather_facts: true
  tasks:
    - name: Install Claude Code via npm (macOS/Linux)
      community.general.npm:
        name: "@anthropic-ai/claude-code"
        global: true
        state: present
      environment:
        PATH: "{{ ansible_env.PATH }}"
      when: ansible_facts['os_family'] != 'Windows'

    - name: Install Claude Code via npm (Windows)
      ansible.windows.win_shell: npm install -g @anthropic-ai/claude-code
      when: ansible_facts['os_family'] == 'Windows'
      changed_when: true

    - name: Configure Claude Code in ~/.bashrc (Windows)
      ansible.windows.win_shell: |
        $bashrc = "$env:USERPROFILE\.bashrc"
        $begin  = "# BEGIN devtools:claude-code"
        $end    = "# END devtools:claude-code"
        $lines  = @(
          "# BEGIN devtools:claude-code",
          'export CLAUDE_CODE_GIT_BASH_PATH="C:\Program Files\Git\bin\bash.exe"',
          "# END devtools:claude-code"
        )
        $block = $lines -join "`n"
        if (-not (Test-Path $bashrc)) { New-Item -ItemType File -Path $bashrc -Force | Out-Null }
        $content = Get-Content $bashrc -Raw -ErrorAction SilentlyContinue
        if ($null -ne $content -and $content -match [regex]::Escape($begin)) {
          $content = $content -replace "(?s)$([regex]::Escape($begin)).*?$([regex]::Escape($end))", $block
        } else {
          if ($null -ne $content) { $base = $content.TrimEnd() } else { $base = "" }
          $content = $base + "`n" + $block + "`n"
        }
        Set-Content -Path $bashrc -Value $content.TrimStart() -NoNewline
      when: ansible_facts['os_family'] == 'Windows'
      changed_when: true

    - name: Ensure ~/.claude.json exists (macOS/Linux)
      ansible.builtin.copy:
        content: "{}\n"
        dest: "{{ ansible_facts['user_dir'] }}/.claude.json"
        force: false
        mode: "0600"
      when: ansible_facts['os_family'] != 'Windows'

    - name: Ensure ~/.claude.json exists (Windows)
      ansible.windows.win_shell: |
        $f = "$env:USERPROFILE\.claude.json"
        if (-not (Test-Path $f)) {
          [System.IO.File]::WriteAllText($f, "{}", (New-Object System.Text.UTF8Encoding($false)))
        }
      when: ansible_facts['os_family'] == 'Windows'
      changed_when: false

    - name: Configure MCP servers (macOS)
      ansible.builtin.shell: |
        set -euo pipefail
        patched=$(jq --arg name "{{ item.key }}" \
          --argjson config '{{ item.value | to_json }}' \
          '.mcpServers[$name] //= $config' \
          ~/.claude.json)
        if [[ -z "${patched//[[:space:]]/}" ]]; then
          echo "jq produced empty output while updating ~/.claude.json" >&2
          exit 1
        fi
        printf '%s\n' "$patched" > ~/.claude.json
      args:
        executable: /bin/bash
      loop: "{{ claude_mcp_servers | dict2items }}"
      when: ansible_facts['system'] == 'Darwin'
      changed_when: true
      no_log: true

    - name: Configure MCP servers (Windows)
      ansible.windows.win_copy:
        dest: "{{ ansible_facts['user_dir'] }}\\.claude.mcp.desired.json"
        content: "{{ claude_mcp_servers | to_nice_json }}\n"
      when: ansible_facts['os_family'] == 'Windows'
      no_log: true

    - name: Merge MCP servers into Claude config (Windows)
      ansible.windows.win_shell: |
        function ConvertTo-Hashtable($value) {
          if ($null -eq $value) {
            return $null
          }

          if ($value -is [System.Management.Automation.PSCustomObject]) {
            $result = @{}
            foreach ($prop in $value.PSObject.Properties) {
              $result[$prop.Name] = ConvertTo-Hashtable $prop.Value
            }
            return $result
          }

          if ($value -is [System.Collections.IDictionary]) {
            $result = @{}
            foreach ($key in $value.Keys) {
              $result[$key] = ConvertTo-Hashtable $value[$key]
            }
            return $result
          }

          if ($value -is [System.Collections.IEnumerable] -and -not ($value -is [string])) {
            $items = @()
            foreach ($item in $value) {
              $items += ,(ConvertTo-Hashtable $item)
            }
            return $items
          }

          return $value
        }

        function Read-JsonHashtable($path) {
          if (-not (Test-Path $path)) {
            return @{}
          }

          $raw = [System.IO.File]::ReadAllText($path)
          if ([string]::IsNullOrWhiteSpace($raw)) {
            return @{}
          }

          try {
            $parsed = $raw | ConvertFrom-Json
          } catch {
            throw ("Invalid JSON in {0}: {1}" -f $path, $_.Exception.Message)
          }

          $result = ConvertTo-Hashtable $parsed
          if ($null -eq $result) {
            return @{}
          }

          if (-not ($result -is [System.Collections.IDictionary])) {
            throw ("Expected a JSON object in {0}" -f $path)
          }

          return $result
        }

        $claude_json = "$env:USERPROFILE\.claude.json"
        $desired_json = "$env:USERPROFILE\.claude.mcp.desired.json"
        if (-not (Test-Path $claude_json)) {
          [System.IO.File]::WriteAllText($claude_json, "{}", (New-Object System.Text.UTF8Encoding($false)))
        }
        if (-not (Test-Path $desired_json)) {
          throw ("Desired MCP config file not found: {0}" -f $desired_json)
        }

        $claudeObj = Read-JsonHashtable $claude_json
        $desiredObj = Read-JsonHashtable $desired_json

        if (-not $claudeObj.ContainsKey('mcpServers') -or -not ($claudeObj['mcpServers'] -is [System.Collections.IDictionary])) {
          $claudeObj['mcpServers'] = @{}
        }

        foreach ($key in $desiredObj.Keys) {
          if (-not $claudeObj['mcpServers'].ContainsKey($key)) {
            $claudeObj['mcpServers'][$key] = $desiredObj[$key]
          }
        }

        $json = $claudeObj | ConvertTo-Json -Depth 20
        if ([string]::IsNullOrWhiteSpace($json)) {
          throw ("ConvertTo-Json produced empty output while updating {0}" -f $claude_json)
        }

        $tmp = $claude_json + ".tmp"
        [System.IO.File]::WriteAllText($tmp, ($json.TrimEnd() + [Environment]::NewLine), (New-Object System.Text.UTF8Encoding($false)))
        Move-Item -Path $tmp -Destination $claude_json -Force
        Write-Output "MCP_UPDATED"
      when: ansible_facts['os_family'] == 'Windows'
      changed_when: true
      no_log: true

    - name: Remove temporary MCP desired config (Windows)
      ansible.windows.win_file:
        path: "{{ ansible_facts['user_dir'] }}\\.claude.mcp.desired.json"
        state: absent
      when: ansible_facts['os_family'] == 'Windows'
      no_log: true
