---
- name: Configure runtime environment variables via 1Password CLI
  hosts: localhost
  gather_facts: true
  tasks:
    - name: Build runtime env .bashrc block
      ansible.builtin.set_fact:
        _runtime_env_bash_block: |
          if command -v op &>/dev/null; then
            [[ -f ~/.op-session.env ]] && source ~/.op-session.env
            if ! op account get &>/dev/null; then
              eval "$(op signin)"
              env | grep '^OP_SESSION_' | sed 's/^/export /' > ~/.op-session.env
              chmod 600 ~/.op-session.env
            fi
          {% for var in runtime_env_vars %}
            export {{ var }}="$(op read 'op://{{ onepassword_vault }}/{{ var }}/password' 2>/dev/null)"
          {% endfor %}
          fi
      when: onepassword_vault | length > 0

    - name: Remove any hardcoded exports of runtime env vars from ~/.bashrc (macOS/Linux)
      ansible.builtin.lineinfile:
        path: "~/.bashrc"
        regexp: '^export {{ item }}='
        state: absent
      loop: "{{ runtime_env_vars }}"
      when: ansible_facts['os_family'] != 'Windows' and onepassword_vault | length > 0

    - name: Write runtime env vars to ~/.bashrc (macOS/Linux)
      ansible.builtin.blockinfile:
        path: "~/.bashrc"
        marker: "# {mark} devtools:runtime-env"
        block: "{{ _runtime_env_bash_block }}"
      when: ansible_facts['os_family'] != 'Windows' and onepassword_vault | length > 0

    - name: Remove any hardcoded exports of runtime env vars from ~/.bashrc (Windows)
      ansible.windows.win_shell: |
        $bashrc = "$env:USERPROFILE\.bashrc"
        if (-not (Test-Path $bashrc)) { return }
        $lines = Get-Content $bashrc -ErrorAction SilentlyContinue
        if ($null -eq $lines) { return }
        $pattern = '^export {{ item }}='
        $filtered = $lines | Where-Object { $_ -notmatch $pattern }
        if ($filtered.Count -ne $lines.Count) {
          Set-Content -Path $bashrc -Value ($filtered -join "`n") -NoNewline
        }
      loop: "{{ runtime_env_vars }}"
      when: ansible_facts['os_family'] == 'Windows' and onepassword_vault | length > 0
      changed_when: true

    - name: Write runtime env block to temp file (Windows)
      ansible.windows.win_copy:
        dest: "{{ ansible_facts['user_dir'] }}\\.runtime-env.tmp"
        content: "{{ _runtime_env_bash_block }}"
      when: ansible_facts['os_family'] == 'Windows' and onepassword_vault | length > 0

    - name: Merge runtime env block into ~/.bashrc (Windows)
      ansible.windows.win_shell: |
        $bashrc  = "$env:USERPROFILE\.bashrc"
        $tmpFile = "$env:USERPROFILE\.runtime-env.tmp"
        $begin   = "# BEGIN devtools:runtime-env"
        $end     = "# END devtools:runtime-env"
        $inner   = [System.IO.File]::ReadAllText($tmpFile).TrimEnd()
        $block   = $begin + "`n" + $inner + "`n" + $end
        if (-not (Test-Path $bashrc)) { New-Item -ItemType File -Path $bashrc -Force | Out-Null }
        $content = Get-Content $bashrc -Raw -ErrorAction SilentlyContinue
        if ($null -ne $content -and $content -match [regex]::Escape($begin)) {
          $content = $content -replace "(?s)$([regex]::Escape($begin)).*?$([regex]::Escape($end))", $block
        } else {
          if ($null -ne $content) { $base = $content.TrimEnd() } else { $base = "" }
          $content = $base + "`n" + $block + "`n"
        }
        Set-Content -Path $bashrc -Value $content.TrimStart() -NoNewline
      when: ansible_facts['os_family'] == 'Windows' and onepassword_vault | length > 0
      changed_when: true

    - name: Remove runtime env temp file (Windows)
      ansible.windows.win_file:
        path: "{{ ansible_facts['user_dir'] }}\\.runtime-env.tmp"
        state: absent
      when: ansible_facts['os_family'] == 'Windows' and onepassword_vault | length > 0
